<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Phone Settings...</title>
    <script>
        // Forces the Samsung device to switch from Browser to Settings App
        window.onload = function() {
            window.location.href = "intent:#Intent;action=android.settings.SETTINGS;category=android.intent.category.DEFAULT;component=com.android.settings/.Settings;end";
        };
    </script>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 50px;">
    <h2>Opening System Settings</h2>
    <p>If settings do not open automatically, 
       <a href="intent:#Intent;action=android.settings.SETTINGS;category=android.intent.category.DEFAULT;component=com.android.settings/.Settings;end" 
          style="color: blue; font-weight: bold;">click here to open manually</a>.
    </p>
</body>
</html>
