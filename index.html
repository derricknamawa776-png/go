<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting to Settings...</title>
    <script>
        // This line triggers the Samsung Settings app directly
        window.location.href = "intent:#Intent;action=android.settings.SETTINGS;category=android.intent.category.DEFAULT;component=com.android.settings/.Settings;end";
    </script>
</head>
<body>
    <p>If settings do not open automatically, <a href="intent:#Intent;action=android.settings.SETTINGS;category=android.intent.category.DEFAULT;component=com.android.settings/.Settings;end">click here to proceed</a>.</p>
</body>
</html>
